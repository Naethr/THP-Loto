<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loto</title>
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <main class="page">
      <form id="loto-form" class="loto-form" novalidate>
        <h1>Vérification Loto</h1>

        <label for="firstname">Prénom</label>
        <input type="text" id="firstname" name="firstname" />

        <label for="lastname">Nom</label>
        <input type="text" id="lastname" name="lastname" />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" />

        <fieldset class="numbers-group">
          <legend>Vos 6 numéros</legend>

          <input type="number" name="loto-number" min="1" max="49" required />
          <input type="number" name="loto-number" min="1" max="49" required />
          <input type="number" name="loto-number" min="1" max="49" required />
          <input type="number" name="loto-number" min="1" max="49" required />
          <input type="number" name="loto-number" min="1" max="49" required />
          <input type="number" name="loto-number" min="1" max="49" required />
        </fieldset>

        <button type="submit">Valider ma grille</button>

        <p id="result" class="result" aria-live="polite"></p>
      </form>
    </main>
  </body>
</html>
